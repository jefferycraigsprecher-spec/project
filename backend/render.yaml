services:
  - type: web
    name: midwest-shipment-backend
    env: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: DB_CLIENT
        value: "sqlite"
      - key: DB_PATH
        value: "./database.sqlite"
      - key: FRONTEND_URL
        value: "https://midwest-shipment.midwestlogistics.workers.dev"
      - key: NODE_ENV
        value: "production"
